<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SwipeGo Arcade: SA Brand Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion for buttery swipe physics -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; font-family: system-ui, -apple-system, sans-serif; touch-action: none; }
        #root { height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        .card-container { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .swipe-card { position: absolute; width: 80%; max-width: 320px; height: 60%; max-height: 400px; background: white; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: grab; }
        .swipe-card:active { cursor: grabbing; }
        .brand-logo { font-size: 3rem; font-weight: 800; color: #0f172a; text-align: center; line-height: 1.1; }
        .brand-category { color: #64748b; font-size: 1rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .verdict-stamp { position: absolute; top: 20px; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; border: 4px solid; border-radius: 8px; padding: 4px 12px; opacity: 0; pointer-events: none; }
        .stamp-go { color: #22c55e; border-color: #22c55e; right: 20px; transform: rotate(15deg); }
        .stamp-nogo { color: #ef4444; border-color: #ef4444; left: 20px; transform: rotate(-15deg); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="./src/App.jsx"></script>
</body>
</html>
